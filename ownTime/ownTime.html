		<script>
			$(document).contextmenu(function(event){
				$('#contextMenu').show();
				
           	    $('ul').offset({

           	   	    left:event.pageX
           	   })
           	    
           	    $(this).click(function(){
            	    $('ul').hide()
                })
				return false;
			});

//			})
			
			
			document.body.oncopy=function(){

			document.body.onselectstart=function(){

			}
		</script>
		
		
		
		<script>

		<script>
			function contextMenu(event){
//                  $(document).select('auto');
//                  alert($('body').select())
//                  document.body.style.
                    document.body.onselectstart=function(){
				       return true;//禁止被选中
			       }
                var contextMenu_li1=$('#contextMenu li:first-child').val();
                if(event.shiftKey&&event.keyCode==74||contextMenu_li1==1){   
                   document.body.oncopy=function(){
				      return true;
			        };
			        booReport=true;
			        
			        if(booReport==true&&numberReport==0){
            	        $('#report').show(200).delay(700).hide(1);
            	        booReport=false;
            	        numberReport=1;
                    }
			        
				}
			
			}
			
			$(document).keydown(function(event){
				contextMenu(event)
			})
			$('#contextMenu li:first-child').click(function(event){
				$(this).val('1')
				contextMenu(event)
			})
		</script>

			})
			
			})//固定值，有缺陷
//			alert(f/2);转成nuber在计算
		</script>
