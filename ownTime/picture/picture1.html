//          需要进行判断是否添加了(即数组是否为空),添加了就不改变原来的数组,

        <!--abc函数-img宽高适应li元素宽高-->
	    <script>
	    function abc(x_w,y_h){
	    	li=$('#first_ul li').length;
//          不能添加到全局,因为要延迟获取到li的数量
              if(img_w==""){
              	for (var i=0;i<li;i++) {
//	    		var h1=$('#first_ul li:nth-child('+i+')');因为img分开在li里不能用这种方法
	    		img_w[i]=$('#first_ul li img').eq(i).width();
	    		img_h[i]=$('#first_ul li img').eq(i).height();
	    		img_src[i]=$('#first_ul li img').eq(i).attr('src');
	    		//等图片加载完才能获取到
	    	    }
              }else{
              	img_w[$('#first_ul img').length-1]=$('#first_ul img:last').width();
                img_h[$('#first_ul img').length-1]=$('#first_ul img:last').height();
                img_src[$('#first_ul img').length-1]=$('#first_ul img:last').attr('src');
              }
        for(var j=0;j<li;j++){	
            if(img_w[j]>=img_h[j]){
            	if(img_w[j]>x_w){
//          		img_w[j]=li_w;
            		$('#first_ul li img').eq(j).width(x_w);	
            	}
            	if(img_h[j]>y_h){
	    		    $('#first_ul li img').eq(j).height(y_h);
	    		}else{
	    			$('#first_ul li img').eq(j).height(img_h[j]);
	    			//指定高，保证不会出现上边距的不一致
	    			$('#first_ul li img').eq(j).css('margin-top',(y_h-img_h[j])/2);
	    		}
            	
	    	}else{
	    		if(img_h[j]>y_h){
	    		    $('#first_ul li img').eq(j).height(y_h);
	    		}else{
	    			$('#first_ul li img').eq(j).css('margin-top',(y_h-img_h[j])/2);
	    		}
	    		if(img_w[j]>x_w){
//	    			img_h[j]=li_h;
	    		    $('#first_ul li img').eq(j).width(x_w);
	    		}
	    		
	    	}  		
        }  
        
        $('img').css('display','inline-block');
        //图片显示会先比for和if先被执行，for和if他们才能获取到图片的宽高
        //这种在html加载完毕后再显示，不会出现图片原来位置大小的影子，注意img是行内块级元素
	    }
	    </script>

//                  因为图片初始设置为none,所以这样获取不到图片的宽高
            	    setTimeout('abc(li_w,li_h)',50)

                    setTimeout(function(){
                    	  $('#first_ul li:last').css('border-color','black')
                    	},100)
                    
                    
                    function onload(){
                    $('#first_ul img:last').css('display','inline-block');
                    if($('#first_ul img:last').width()<=16){
                    	$('#first_ul img:last').parent().remove();
                    	warn('上传的地址错误','图片可能小于1KB')
                    	sure()
                    }
                }   
                setTimeout(onload,52);
                    
            function repeat(){
            	 for(var k=0;k<li;k++){
                    if($('#input_add').val()==img_src[k]){
                    	var eventNumber=0;    	
	    		}
	    	};
            	 if(eventNumber==0){
	    	    	warn('图片可能存在重复,是否继续添加')
                    sure(eventNumber)   
	    	    }//图片重复函数    
            }
            setTimeout(repeat,10);  
            	})
            	
            	
            	$('#input_add').blur(function(){
            		setTimeout(function(){
            			$('#input_add').val("")
            		},200)
                //由于确保添加函数函数先执行才能获取到input里面的值所以要添加延迟时间
            	})

        <!--图片预览设置-->
        <script>
        	function preview(index){
//      		index=$('#first_ul img').index($(this));
        		var clone=$('#first_ul img').eq(index).clone();//克隆
        		$('#check').append(clone);
                $('#check').width(body_w);
                $('#check').height(body_h-60);
                
                var check_w=$('#check').width();
                var check_h=$('#check').height();
                $('#check img').width(img_w[index]);
                $('#check img').height(img_h[index]);
                if(img_w[index]>=img_h[index]){
                	if(img_w[index]>check_w){
                		$('#check img').width(check_w);
                	}
                	
                	if (img_h[index]>check_h) {
                		$('#check img').height(check_h);
                	}else{
                		$('#check img').height(img_h[index]);//指定高，保证不会出现上边距的不一致
                		$('#check img').css('margin-top',(check_h-img_h[index])/2);
                	}
	
                }else{
                	if(img_w[index]>check_w){
                		$('#check img').width(check_w);
                	}
                	
                	if (img_h[index]>check_h) {
                		$('#check img').height(check_h);
                	}else{
                		$('#check img').css('margin-top',(check_h-img_h[index])/2);
                	}
                	
                }
                
//              $(this).parent().hide()
//              $('#first_ul li').eq(index).hide()
                $('#check_left').css({
           	        top:body_h/2,
           	        left:$('#check_div1').width()/2-20,
           	        display:'block'
                })
                $('#check_right').css({
           	        top:body_h/2,
           	        left:body_w-$('#check_div2').width()/2-20,
           	        display:'block'
                })
                $('#check_close').css({
           	        top:80,
           	        left:body_w-$('#check_div2').width()/2-20,
           	        display:'block'
                })
        	}
        	$(document).on('click','#first_ul img',function(){
        		index=$('#first_ul img').index($(this));
        		preview(index);
        	});//事件绑定
        </script>

        <!--纯净模式打开和解除-->
        <script>
        	
			function contextMenu(event){
				var contextMenu_li1=$('#contextMenu li:first-child').val();
				var check_show=$('#check').width()
				if(check_show>10){//判断预览框里面存在图片在触发
                 if(event.shiftKey&&event.keyCode==67||contextMenu_li1==1){  
			       if(status==0){
			       	  $('#check_div1').add('#check_div2').hide();
                      $('#check_left').add('#check_right').add('#check_close').hide();
                      $('#contextMenu li:first-child').html('解除纯净<span>Shift+J</span>')
                      $('#check').siblings().css('opacity',0.1);
                      $('#contextMenu').siblings().css('opacity',0.1);
                      status=1;
			       }else{
			       	  $('#check_div1').add('#check_div2').show();
                      $('#check_left').add('#check_right').add('#check_close').show();
                      $('#contextMenu li:first-child').html('纯净模式<span>Shift+C</span>')
                      $('#check').siblings().css('opacity',1);
                      $('#contextMenu').siblings().css('opacity',1);
                      
                      status=0;
			       }
                }
                
             }  

			}
			$(document).keydown(function(event){
				contextMenu(event)
			})
			$('#contextMenu li:first-child').click(function(event){
				
				$(this).val(1)
				contextMenu(event)
			})
		</script>
		
		<!--关闭图片预览-->
		<script>
			function close(){
				$('#check img').remove();
				$('#check').css({
					width:0,
					height:0
				})
				
				$('#check_left').hide();
				$('#check_right').hide();
				$('#check_close').hide();
			}
            $('#check_close').click(close)
		</script>
		
		<!--提示函数-->
        <script>
        	function tips(value){
        		$('#report').css({
        			top:body_h/2-10,
        			left:body_w/2-300,
        			letterSpacing:'5px',
        			background:'grey'
        		})

        <!--预览图片切换-->
        <script>
        	$('#check_left').click(function(){
               $('#check img').remove();
               if(index==0){
               	 index=$('#first_ul li img').length;
               }
            var preindex=index-1;
               preview(preindex);
               index--;
               if(index==0){
               	index=$('#first_ul li img').length;
               	tips('当前位置第一张图片');
               }           
//             alert(index)
//             index=$('#first_ul li img').length;img_w.length=7
//             alert(img_h[6])
               return false;
        	})
        	
        	$('#check_right').click(function(){
               $('#check img').remove();
               if(index==$('#first_ul li img').length-1){
               	 index=-1
               }
            var preindex=index+1;
               preview(preindex);
               index++;
               if(index==$('#first_ul li img').length-1){
               	index=-1;
               	tips('当前位置最后一张图片');
               }
        	})
        </script>
